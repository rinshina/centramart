<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/user/index-user-header.css">
    <link rel="stylesheet" href="../css/user/index-user-footer.css">
    <link rel="stylesheet" href="../css/user/index-user-products-of-the-wek.css">
    <link rel="stylesheet" href="../css/user/wishlist.css">
</head>
<body>

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main class="wishlist-page">
        <div class="container py-4">
            
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">CentraMart</a></li>
                    <li class="breadcrumb-item active">Wishlist</li>
                </ol>
            </nav>

            <!-- Wishlist Title -->
            <h2 class="wishlist-title mb-4">Wishlist</h2>

                <!-- wishlist loads here -->

            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/user/header-auth.js"></script>
    <script src="../js/user/wishlist.js"></script>
    <script>
        // Load partials
        function loadHTML(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                });
        }
        
        loadHTML("header-placeholder", "partials/header.html");
        loadHTML("footer-placeholder", "partials/footer.html");
        
        // Initialize auth state after header loads
        setTimeout(initializeAuthState, 100);
    </script>
</body>
