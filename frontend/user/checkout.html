<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - CentraMart</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/user/index-user-header.css">
    <link rel="stylesheet" href="../css/user/index-user-footer.css">
    <link rel="stylesheet" href="../css/user/checkout.css">
</head>
<body>

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main class="checkout-page">
        <div class="container py-5">
            
            <div class="row">
                
                <!-- LEFT COLUMN -->
                <div class="col-lg-8">
                    
                    <!-- BILLING INFORMATION -->
                    <div class="checkout-section">
                        <h5>Billing Information</h5>
                        <div id="addressOptions">

                        </div>
                        
                        
                        <button class="btn btn-outline-secondary mt-3" id="addAddressBtn">+ Add New Address</button>
                    </div>
                    
                    <!-- PAYMENT OPTION -->
                    <div class="checkout-section">
                        <h5>Payment Option</h5>
                        
                        <div class="payment-methods">
                            <div class="payment-method">
                                <img src="../assets/icons/dollar.png" width="24">
                                <span>Cash on Delivery</span>
                            </div>
                            <div class="payment-method">
                                <img src="../assets/icons/wallet.png" width="24">
                                <span>Wallet</span>
                            </div>
                            <div class="payment-method">
                                <img src="../assets/payments/paypal.png" width="24">
                                <span>Paypal</span>
                            </div>
                            <div class="payment-method">
                                <img src="../assets/payments/amazonpay.png" width="24">
                                <span>Amazon Pay</span>
                            </div>
                            <div class="payment-method active">
                                <img src="../assets/icons/payment.png" width="24">
                                <span>Debit/Credit Card</span>
                            </div>
                        </div>
                        
                        <!-- Card Details -->
                        <div class="card-details">
                            <div class="form-group">
                                <label>Name on Card</label>
                                <input type="text" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Card Number</label>
                                <input type="text" class="form-control">
                            </div>
                            
                            <div class="row">
                                <div class="col-6">
                                    <div class="form-group">
                                        <label>Expire Date</label>
                                        <input type="text" class="form-control" placeholder="DD/YY">
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-group">
                                        <label>CVC</label>
                                        <input type="text" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- ADDITIONAL INFORMATION -->
                    <div class="checkout-section">
                        <h5>Additional Information</h5>
                        
                        <div class="form-group">
                            <label>Order Notes (Optional)</label>
                            <textarea class="form-control" rows="4" placeholder="Notes about your order, e.g. special notes for delivery"></textarea>
                        </div>
                    </div>
                    
                </div>
                
                <!-- RIGHT COLUMN - ORDER SUMMARY -->
                <div class="col-lg-4">
                    <div class="order-summary">
                        <h5>Order Summary</h5>
                        
                        <div id="orderSummary">
                        </div>
                        
                        <!-- Totals -->
                        <div class="order-totals">
                            <!-- totals load here -->
                        </div>
                        
                        <button class="btn btn-place-order" onclick="window.location.href='checkout-success.html'">PLACE ORDER →</button>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/user/cart.js"></script>
    <script src="../js/user/header-auth.js"></script>
    <script src="../js/user/checkout.js"></script>
    <script>
        // Load partials
            function loadHTML(id, file) {
                return fetch(file)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById(id).innerHTML = data;
                    });
            }

            Promise.all([
                loadHTML("header-placeholder", "partials/header.html"),
                loadHTML("footer-placeholder", "partials/footer.html")
            ]).then(() => {

                initializeAuthState();
                updateCartBadge();
                renderCartDropdown()
            });
    </script>
</body>
</html>
