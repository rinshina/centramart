<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - CentraMart</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/user/index-user-header.css">
    <link rel="stylesheet" href="../css/user/index-user-footer.css">
    <link rel="stylesheet" href="../css/user/shopping-cart.css">
</head>
<body>

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main class="shopping-cart-page" id="shoppingCartGrid">
        <div class="container py-5 col-10 col-lg-8 ">
        
            <!-- Page Title -->
            <h2 class="cart-title mb-4">My Shopping Cart</h2>
        
            <div class="d-flex flex-row gap-3">
        
                <!-- CART ITEMS -->
                <div class="col-lg-8">
                    <div class="cart-items">
                        <div id="cartItemGrid">
                            <!-- cart items loads here -->
                        </div>
                        
        
                        <!-- Action Buttons -->
                        <div class="cart-actions">
                            <button class="btn ">
                                <img src="../assets/icons/left-arrow.png" height="15" width="15" alt="left-arrow" srcset="">
                                RETURN TO SHOP
                            </button>
                        </div>
        
                    </div>
                </div>
        
                <!-- CART TOTALS -->
                <div class="col-lg-4 gap-4" id="cartPriceGrid">
                    <!-- cart toal pricing loads here -->
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/user/cart.js"></script>
    <script src="../js/user/header-auth.js"></script>
    <script src="../js/user/shopping-cart.js"></script>
    <script>
        // Load partials
        function loadHTML(id, file) {
            return fetch(file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                });
        }
        
        Promise.all([
                loadHTML("header-placeholder", "partials/header.html"),
                loadHTML("footer-placeholder", "partials/footer.html")
            ]).then(() => {
                
                initializeAuthState();
                updateCartBadge();
                renderCartDropdown()
            });
        
    </script>
</body>
</html>
