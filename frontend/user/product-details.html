<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - CentraMart</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/user/index-user-header.css">
    <link rel="stylesheet" href="../css/user/index-user-footer.css">
    <link rel="stylesheet" href="../css/user/product-detail.css">
</head>
<body>

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main class="product-detail-page">
        <div class="container py-4" id="product-detail">
            <!-- product-details loads here -->
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/user/cart.js"></script>
    <script src="../js/user/header-auth.js"></script>
    <script src="../js/user/product-detail.js"></script>
    <script>
        function loadHTML(id, file) {
            return fetch(file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                });
        }

        loadHTML("header-placeholder", "partials/header.html")
            .then(() => {
                initializeAuthState();
                updateCartBadge();
                renderCartDropdown()
            });

        loadHTML("footer-placeholder", "partials/footer.html");
    </script>

</body>
</html>
